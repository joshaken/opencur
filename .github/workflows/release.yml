name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild \
            -project opencur.xcodeproj \
            -scheme opencur \
            -configuration Release \
            -derivedDataPath build \
            clean build

      - name: Zip App
        run: |
          ditto -c -k --keepParent \
            build/Build/Products/Release/opencur.app \
            opencur.zip

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            opencur.zip \
            --generate-notes