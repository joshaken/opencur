name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build App
        run: |
          xcodebuild \
            -project opencur.xcodeproj \
            -scheme opencur \
            -configuration Release \
            -derivedDataPath build \
            clean build

      - name: Install create-dmg
        run: |
          brew update
          brew install create-dmg

      - name: Create DMG
        run: |
          APP_DIR="build/Build/Products/Release"

          create-dmg \
            --volname "opencur" \
            --volicon "$APP_DIR/opencur.app/Contents/Resources/AppIcon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 120 \
            --icon "opencur.app" 160 190 \
            --hide-extension "opencur.app" \
            --app-drop-link 440 190 \
            --format UDZO \
            --no-internet-enable \
            "opencur.dmg" \
            "$APP_DIR"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            opencur.dmg \
            --generate-notes
